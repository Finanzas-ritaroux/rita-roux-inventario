<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Bodega — Rita Roux</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
  background: #1a1a1a; color: #ffffff;
  font-family: 'Segoe UI', system-ui, sans-serif;
  min-height: 100vh; overflow-x: hidden;
}

/* ── Contenedor centrado ── */
.ctr { max-width: 520px; margin: 0 auto; padding: 28px 14px 24px; }

/* ── Pasos ── */
.step { display: none; }
.step.active { display: block; }
.step-title {
  font-size: 15px; color: #aaa; text-align: center;
  margin-bottom: 22px; text-transform: uppercase; letter-spacing: .8px;
}

/* ── Botones grandes (rol y persona) ── */
.btn-grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.btn-grid-auto { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px,1fr)); gap: 11px; }

.btn-grande {
  background: #2a2a2a;
  border: 2px solid #404040;
  border-radius: 16px;
  color: #ffffff;           /* ← explícito: evita el negro por defecto de <button> */
  cursor: pointer;
  font-family: inherit;
  padding: 22px 12px;
  text-align: center;
  transition: background .12s, border-color .12s;
  touch-action: manipulation;
  width: 100%;
  /* Sin emojis ni iconos, solo texto */
}
.btn-grande:active { background: #2d4d30; border-color: #5e7e62; }
.btn-grande .rol-nm  { font-size: 17px; font-weight: 700; display: block; color: #ffffff; }
.btn-grande .rol-sub { font-size: 11px;  color: #999;    display: block; margin-top: 5px; }

/* ── Botones de acción (Ingresar / Sacar) ── */
.btn-accion {
  display: flex; align-items: center; gap: 16px;
  background: #2a2a2a; border: 2px solid #404040; border-radius: 14px;
  color: #ffffff; cursor: pointer; font-family: inherit;
  padding: 20px 18px; text-align: left;
  touch-action: manipulation; width: 100%;
  transition: background .12s, border-color .12s;
  margin-bottom: 12px;
}
.btn-accion:active { background: #2d4d30; border-color: #5e7e62; }
.btn-accion.rojo:active { background: #5a1e1e; border-color: #c05050; }
.btn-accion .a-titulo { font-size: 16px; font-weight: 700; display: block; color: #ffffff; }
.btn-accion .a-desc   { font-size: 12px; color: #aaa; display: block; margin-top: 4px; }

/* ── Botón de volver ── */
.btn-volver {
  background: none; border: none; color: #888;
  font-size: 14px; cursor: pointer; padding: 0; margin-bottom: 16px;
  font-family: inherit; touch-action: manipulation;
}

/* ── Pill de usuario ── */
.user-pill {
  display: inline-block; background: #2a2a2a;
  border: 1px solid #404040; border-radius: 20px;
  padding: 5px 14px; font-size: 12px; color: #aaa; margin-bottom: 16px;
}
.user-pill b { color: #7a9e7e; }

/* ── Búsqueda ── */
.search-wrap { margin-bottom: 10px; }
.search-wrap input {
  width: 100%; background: #222; border: 2px solid #3a3a3a;
  border-radius: 10px; color: #fff; font-size: 16px; padding: 12px 14px;
  font-family: inherit;
}
.search-wrap input:focus { outline: none; border-color: #5e7e62; }
.search-wrap input::placeholder { color: #555; }

/* ── Filtros de categoría ── */
.cats { display: flex; gap: 7px; overflow-x: auto; padding-bottom: 8px; margin-bottom: 10px; scrollbar-width: none; }
.cats::-webkit-scrollbar { display: none; }
.cat-pill {
  background: #222; border: 1px solid #3a3a3a; border-radius: 20px;
  padding: 6px 14px; font-size: 12px; color: #999;
  cursor: pointer; white-space: nowrap; flex-shrink: 0;
  touch-action: manipulation; font-family: inherit; border-top-style: solid;
}
.cat-pill.active { background: #2d4d30; border-color: #5e7e62; color: #fff; }

/* ── Grilla de ingredientes ── */
.ing-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(100px,1fr));
  gap: 9px; max-height: 42vh; overflow-y: auto;
}
.ing-card {
  background: #222; border: 2px solid #3a3a3a; border-radius: 12px;
  padding: 12px 6px 10px; text-align: center;
  cursor: pointer; touch-action: manipulation; font-family: inherit;
  color: #fff; width: 100%;
  transition: background .1s, border-color .1s;
}
.ing-card:active, .ing-card.sel { background: #2d4d30; border-color: #5e7e62; }
.ing-card .i-nm { font-size: 11.5px; font-weight: 700; line-height: 1.3; color: #fff; }
.ing-card .i-un { font-size: 10px; color: #888; margin-top: 3px; }
.ing-card.sel .i-un { color: #8fba92; }

/* ── Panel de cantidad ── */
.qty-box { background: #222; border-radius: 14px; padding: 18px; margin-top: 12px; display: none; }
.qty-box.visible { display: block; }
.qty-label { font-size: 13px; font-weight: 700; color: #7a9e7e; margin-bottom: 12px; }
.qty-row { display: flex; align-items: center; gap: 10px; }
.qty-row input {
  flex: 1; background: #1a1a1a; border: 2px solid #3a3a3a; border-radius: 10px;
  color: #fff; font-size: 28px; font-weight: 700; padding: 10px;
  text-align: center; font-family: inherit;
}
.qty-row input:focus { outline: none; border-color: #5e7e62; }
.qty-unit { font-size: 13px; color: #888; min-width: 28px; }
.qty-stepper { display: flex; gap: 7px; margin-top: 10px; }
.qty-step {
  background: #2a2a2a; border: none; border-radius: 8px; color: #fff;
  font-size: 18px; font-weight: 700; padding: 10px 16px;
  cursor: pointer; flex: 1; font-family: inherit; touch-action: manipulation;
}
.qty-step:active { background: #3a3a3a; }

/* ── Botón principal de confirmación ── */
.btn-confirmar {
  width: 100%; background: #5e7e62; border: none; border-radius: 12px;
  color: #fff; font-size: 16px; font-weight: 700;
  padding: 16px; margin-top: 14px; cursor: pointer;
  font-family: inherit; letter-spacing: .3px; touch-action: manipulation;
}
.btn-confirmar:disabled { background: #333; color: #666; }
.btn-confirmar.rojo { background: #943535; }

/* ── Éxito ── */
.ok-box { text-align: center; padding: 28px 16px; }
.ok-icon { font-size: 52px; }
.ok-msg  { font-size: 15px; color: #8fba92; margin: 14px 0 6px; line-height: 1.5; }
.ok-msg b { color: #fff; }
.ok-who  { font-size: 11px; color: #555; }
.ok-acciones { display: flex; flex-direction: column; gap: 9px; margin-top: 22px; }
.ok-acciones button {
  background: #2a2a2a; border: 2px solid #3a3a3a; border-radius: 11px;
  color: #fff; font-size: 14px; padding: 13px;
  cursor: pointer; font-family: inherit; touch-action: manipulation;
}
.ok-acciones button.primary { background: #2d4d30; border-color: #5e7e62; }
</style>
</head>
<body>
<div class="ctr">

<!-- PASO 1: ROL -->
<div class="step active" id="step-rol">
  <div class="step-title" style="margin-top:20px">¿Quién ingresa?</div>
  <div class="btn-grid-2">
    <button type="button" class="btn-grande" onclick="elegirRol('BARRA','Barra')">
      <span class="rol-nm">Barra</span>
      <span class="rol-sub">Sergio</span>
    </button>
    <button type="button" class="btn-grande" onclick="elegirRol('COCINA','Cocina')">
      <span class="rol-nm">Cocina</span>
      <span class="rol-sub">Kari · Pao · Sara</span>
    </button>
    <button type="button" class="btn-grande" onclick="elegirRol('GAZON','Meseros')">
      <span class="rol-nm">Meseros</span>
      <span class="rol-sub">Shuler · Camila · Part time</span>
    </button>
    <button type="button" class="btn-grande" onclick="elegirRol('JEFATURA','Jefatura')">
      <span class="rol-nm">Jefatura</span>
      <span class="rol-sub">Joshua · Gerardo</span>
    </button>
  </div>
</div>

<!-- PASO 2: PERSONA -->
<div class="step" id="step-persona">
  <button type="button" class="btn-volver" onclick="irPaso('step-rol')">← Volver</button>
  <div class="step-title" id="titulo-personas">Elige tu nombre</div>
  <div class="btn-grid-auto" id="grid-personas"></div>
</div>

<!-- PASO 3: ACCIÓN -->
<div class="step" id="step-accion">
  <button type="button" class="btn-volver" onclick="irPaso('step-persona')">← Volver</button>
  <div class="user-pill">Sesión de <b id="lbl-usuario"></b></div>
  <button type="button" class="btn-accion" onclick="iniciarAccion('ENTRADA')">
    <span style="font-size:24px">+</span>
    <span>
      <span class="a-titulo">Ingresar un producto</span>
      <span class="a-desc">Suma al stock — llegó mercadería a bodega</span>
    </span>
  </button>
  <button type="button" class="btn-accion rojo" onclick="iniciarAccion('SALIDA')">
    <span style="font-size:24px">−</span>
    <span>
      <span class="a-titulo">Sacar un producto de bodega</span>
      <span class="a-desc">Resta del stock — se usó o se retiró algo</span>
    </span>
  </button>
</div>

<!-- PASO 4: SELECCIONAR PRODUCTO + CANTIDAD -->
<div class="step" id="step-producto">
  <button type="button" class="btn-volver" onclick="irPaso('step-accion')">← Volver</button>
  <div class="user-pill" id="lbl-accion-activa"></div>
  <div class="search-wrap">
    <input type="search" id="ing-search" placeholder="Buscar producto o ingrediente…"
           oninput="filtrarIng()" autocomplete="off">
  </div>
  <div class="cats" id="cat-filters"></div>
  <div class="ing-grid" id="ing-grid"></div>

  <div class="qty-box" id="qty-box">
    <div class="qty-label" id="qty-label"></div>
    <div class="qty-row">
      <input type="number" id="qty-val" min="0.01" step="any"
             placeholder="0" inputmode="decimal">
      <span class="qty-unit" id="qty-unit"></span>
    </div>
    <div class="qty-stepper">
      <button type="button" class="qty-step" onclick="ajustarQty(-1)">−1</button>
      <button type="button" class="qty-step" onclick="ajustarQty(+1)">+1</button>
      <button type="button" class="qty-step" onclick="ajustarQty(+5)">+5</button>
    </div>
    <button type="button" class="btn-confirmar" id="btn-confirmar" onclick="confirmar()">
      Confirmar
    </button>
  </div>
</div>

<!-- PASO 5: ÉXITO -->
<div class="step" id="step-ok">
  <div class="ok-box">
    <div class="ok-icon" id="ok-icon">✅</div>
    <div class="ok-msg"  id="ok-msg"></div>
    <div class="ok-who"  id="ok-who"></div>
    <div class="ok-acciones">
      <button type="button" class="primary" id="btn-otro" onclick="otroProducto()">
        Registrar otro producto
      </button>
      <button type="button" onclick="irPaso('step-accion')">Cambiar acción</button>
      <button type="button" onclick="irPaso('step-persona')">Cambiar persona</button>
    </div>
  </div>
</div>

</div><!-- /ctr -->

<script>
// ══ URL del Apps Script (pegar aquí la URL de script.google.com) ══
// Ejemplo: 'https://script.google.com/macros/s/AKfycb.../exec'
const AS_URL = '';

// ══ Personas por rol ══
const PERSONAS = {
  BARRA:    ['Sergio'],
  COCINA:   ['Kari','Pao','Sara'],
  GAZON:    ['Shuler','Camila','Part Time'],
  JEFATURA: ['Joshua','Gerardo'],
};

// ══ Categorías de ingredientes por prefijo ══
const CAT = { CAF:'Café',LAC:'Lácteos',FRV:'Frutas y Verduras',FVR:'Frutas y Verduras',ABA:'Abarrotes',SEM:'Semillas',EMB:'Embutidos',QUE:'Quesos',CAR:'Carnes',CON:'Condimentos',PAN:'Panes',BEB:'Bebidas',BOL:'Bollería',BOLL:'Bollería',SUB:'Preparaciones',SR:'Preparaciones' };
const prefijo = id => ((id||'').match(/^[A-Za-z]+/)||[''])[0].toUpperCase();
const catDe   = id => CAT[prefijo(id)] || 'Otros';

// ══ Estado ══
let rolActual = '', rolLabel = '', usuario = '';
let accionActual = '';   // 'ENTRADA' | 'SALIDA'
let ingSel = null;
let catActiva = 'TODOS';
let INGREDIENTES = {};
let CONFIG = {};

// ══ API (Google Apps Script) ══
async function api(payload) {
  if (!AS_URL) return { ok: true, _demo: true };
  try {
    const r = await fetch(AS_URL, { method:'POST', body: JSON.stringify(payload) });
    return r.json();
  } catch(e) { return { ok: false, error: e.message }; }
}

async function precargarDatos() {
  try {
    const [ri, rc] = await Promise.all([
      api({ accion:'getIngredientes' }),
      api({ accion:'getConfig' }),
    ]);
    if (ri.ok && ri.data) {
      INGREDIENTES = {};
      ri.data.forEach(row => {
        INGREDIENTES[row[0]] = {
          id:row[0], nombre:row[1], unidad:row[2],
          stockMinimo:+row[3]||0, costoActual:+row[4]||0,
          proveedor:row[5]||'', seguimiento:row[6]||'NORMAL', estacion:row[7]||'',
        };
      });
    }
    if (rc.ok && rc.data) CONFIG = rc.data;
  } catch(e) { /* silencioso en modo demo */ }
}

// ══ Navegación entre pasos ══
function irPaso(id) {
  document.querySelectorAll('.step').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  if (id === 'step-producto') {
    document.getElementById('ing-search').value = '';
    catActiva = 'TODOS';
    ingSel = null;
    document.getElementById('qty-box').classList.remove('visible');
    renderCats();
    filtrarIng();
  }
}

// ══ PASO 1 → 2: Elegir rol ══
function elegirRol(rol, label) {
  rolActual = rol; rolLabel = label;
  document.getElementById('titulo-personas').textContent = 'Elige tu nombre';
  document.getElementById('grid-personas').innerHTML =
    (PERSONAS[rol]||[]).map(n =>
      `<button type="button" class="btn-grande" onclick="elegirPersona('${n}')">
         <span class="rol-nm">${n}</span>
       </button>`
    ).join('');
  irPaso('step-persona');
}

// ══ PASO 2 → 3: Elegir persona ══
function elegirPersona(nombre) {
  usuario = nombre;
  document.getElementById('lbl-usuario').textContent = `${nombre} · ${rolLabel}`;
  irPaso('step-accion');
}

// ══ PASO 3 → 4: Elegir acción ══
function iniciarAccion(tipo) {
  accionActual = tipo;
  const esEntrada = tipo === 'ENTRADA';
  document.getElementById('lbl-accion-activa').innerHTML =
    `<b>${usuario}</b> · <b style="color:${esEntrada?'#7a9e7e':'#e05252'}">${esEntrada?'Ingresando':'Sacando'}</b>`;
  document.getElementById('btn-confirmar').textContent =
    esEntrada ? 'Confirmar entrada' : 'Confirmar salida';
  document.getElementById('btn-confirmar').className =
    'btn-confirmar' + (esEntrada ? '' : ' rojo');
  irPaso('step-producto');
}

// ══ PASO 4: Grilla de ingredientes ══
function ingVisibles() {
  const ings = Object.values(INGREDIENTES);
  if (!ings.length) {
    // Sin datos de la API: devuelve lista vacía (modo demo muestra mensaje)
    return [];
  }
  return ings.filter(i => {
    if (i.seguimiento === 'NO_CONTAR') return false;
    if (rolActual !== 'JEFATURA') {
      const est = i.estacion || '';
      if (est && est !== rolActual && est !== 'TODOS') return false;
    }
    return true;
  });
}

function renderCats() {
  const cats = ['TODOS', ...new Set(ingVisibles().map(i => catDe(i.id)))].sort((a,b)=>a==='TODOS'?-1:1);
  document.getElementById('cat-filters').innerHTML =
    cats.map(c =>
      `<button type="button" class="cat-pill${c===catActiva?' active':''}"
               onclick="selCat('${c}')">${c}</button>`
    ).join('');
}
function selCat(c) { catActiva = c; renderCats(); filtrarIng(); }

function filtrarIng() {
  const q = (document.getElementById('ing-search').value||'').toLowerCase();
  let items = ingVisibles();
  if (catActiva !== 'TODOS') items = items.filter(i => catDe(i.id) === catActiva);
  if (q) items = items.filter(i => i.nombre.toLowerCase().includes(q) || i.id.toLowerCase().includes(q));
  items.sort((a,b) => a.nombre.localeCompare(b.nombre));

  const grid = document.getElementById('ing-grid');
  if (!items.length) {
    grid.innerHTML = '<div style="color:#555;padding:18px;grid-column:1/-1;text-align:center">' +
      (Object.keys(INGREDIENTES).length === 0
        ? 'Carga de productos pendiente — configura el Apps Script URL'
        : 'Sin resultados para esta búsqueda') +
      '</div>';
    return;
  }
  grid.innerHTML = items.map(i =>
    `<button type="button" class="ing-card${ingSel&&ingSel.id===i.id?' sel':''}"
             onclick="selIng('${i.id}')">
       <div class="i-nm">${i.nombre}</div>
       <div class="i-un">${i.unidad}</div>
     </button>`
  ).join('');
}

function selIng(id) {
  ingSel = INGREDIENTES[id];
  if (!ingSel) return;
  // Re-renderiza la grilla para marcar la selección
  filtrarIng();
  // Muestra el panel de cantidad
  document.getElementById('qty-label').textContent = ingSel.nombre;
  document.getElementById('qty-unit').textContent   = ingSel.unidad;
  document.getElementById('qty-val').value = '';
  const box = document.getElementById('qty-box');
  box.classList.add('visible');
  box.scrollIntoView({ behavior:'smooth', block:'nearest' });
  document.getElementById('qty-val').focus();
}

function ajustarQty(d) {
  const inp = document.getElementById('qty-val');
  inp.value = Math.max(0, (parseFloat(inp.value)||0) + d);
}

// ══ PASO 5: Confirmar ══
async function confirmar() {
  if (!ingSel) return;
  const cant = parseFloat(document.getElementById('qty-val').value);
  if (!cant || cant <= 0) { document.getElementById('qty-val').focus(); return; }

  const btn = document.getElementById('btn-confirmar');
  btn.disabled = true; btn.textContent = 'Guardando…';

  const ahora    = new Date();
  const fecha    = ahora.toISOString().slice(0,10);
  const hora     = ahora.toTimeString().slice(0,5);
  const esEntrada = accionActual === 'ENTRADA';
  const cantFinal = esEntrada ? cant : -cant;
  const tipo      = esEntrada ? 'ENTRADA' : 'SALIDA_BODEGA';
  const msg       = `${usuario} ha ${esEntrada?'ingresado':'retirado'} ${cant} ${ingSel.unidad} de ${ingSel.nombre}`;

  try {
    await Promise.all([
      api({
        accion: 'registrarEntrada',   // el AS registra bajo este nombre para ambas (el tipo diferencia)
        id: `MOV-${Date.now()}`,
        fecha, hora,
        usuario, rol: rolLabel,
        idIngrediente: ingSel.id, nombreIngrediente: ingSel.nombre,
        cantidad: cantFinal, unidad: ingSel.unidad,
        costoUnitario: ingSel.costoActual || '',
        referencia: `Estación ${rolLabel} — ${esEntrada?'entrada':'salida'}`,
        tipoMovimiento: tipo,
      }),
      api({
        accion: 'registrarNotificacion',
        id: `NOT-${Date.now()}`,
        fecha, hora, usuario, rol: rolLabel,
        idIngrediente: ingSel.id, nombreIngrediente: ingSel.nombre,
        cantidad: cant, unidad: ingSel.unidad, mensaje: msg,
      }),
    ]);

    document.getElementById('ok-icon').textContent = esEntrada ? '✅' : '📤';
    document.getElementById('ok-msg').innerHTML    = msg.replace(usuario, `<b>${usuario}</b>`).replace(ingSel.nombre, `<b>${ingSel.nombre}</b>`);
    document.getElementById('ok-who').textContent  = `${fecha} a las ${hora}`;
    irPaso('step-ok');
  } catch(e) {
    alert('Error al guardar: ' + e.message);
  } finally {
    btn.disabled = false;
    btn.textContent = esEntrada ? 'Confirmar entrada' : 'Confirmar salida';
  }
}

function otroProducto() { irPaso('step-producto'); }

// ══ Inicialización ══
window.addEventListener('DOMContentLoaded', () => {
  precargarDatos();
});
</script>
</body>
</html>
